apiVersion: apps/v1
kind: Deployment
metadata:
  name: mtm-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mtm-worker
  template:
    metadata:
      labels:
        app: mtm-worker
    spec:
      containers:
        - name: mtm-worker
          image: intraday-engine:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.services.mtm_worker"]

          env:

            - name: DATABASE_URL
              value: postgresql://intraday_user:intraday_password_123@intraday-postgres:5432/intraday_engine

            - name: REDIS_URL
              value: redis://intraday-redis:6379
