apiVersion: apps/v1
kind: Deployment
metadata:
  name: intraday-engine
  namespace: intraday
spec:
  replicas: 2
  selector:
    matchLabels:
      app: intraday-engine
  template:
    metadata:
      labels:
        app: intraday-engine
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: intraday-engine
          image: docker.io/rajsomesetty/intraday:v20 
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: intraday-app-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
